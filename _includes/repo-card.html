<a href="{{ include.url }}" class="research-card repo-card" role="listitem" target="_blank" rel="noopener noreferrer">
  <div class="card-top">
    <span class="card-badge">{{ include.badge | default: 'OSS' }}</span>
    <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
  </div>
  <div class="card-title">{{ include.name }}</div>
  {% if include.description %}
  <div class="card-desc">{{ include.description }}</div>
  {% endif %}
  <div class="card-meta">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Open Source
  </div>
</a>
