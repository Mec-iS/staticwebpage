---
layout: default
---
<style>
  .timeline {
    margin: 2rem auto 3rem;
    max-width: 900px;
  }

  .timeline-item {
    display: grid;
    grid-template-columns: 1.25rem 1fr;
    gap: 1rem;
    align-items: start;
  }

  .timeline-itemmarker {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
  }

  .timeline-dot {
    width: 0.8rem;
    height: 0.8rem;
    border-radius: 50%;
    background: var(--color-primary);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-primary) 20%, transparent);
  }

  .timeline-line {
    width: 2px;
    flex: 1;
    margin-top: 0.35rem;
    background-image: repeating-linear-gradient(
      to bottom,
      rgba(40,37,29,0.28) 0,
      rgba(40,37,29,0.28) 5px,
      transparent 5px,
      transparent 11px
    );
  }

  .timeline-item:last-child .timeline-line { display: none; }

  .timeline-itemcontent {
    padding: 0 0 2rem 0.15rem;
  }

  .timeline-itemdate {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-text-faint);
    margin-bottom: 0.25rem;
  }

  .timeline-itemtitle {
    margin: 0 0 0.35rem;
    font-size: clamp(1rem, 1rem + 0.4vw, 1.3rem);
    line-height: 1.25;
  }

  .timeline-itemmeta,
  .timeline-itemlinks {
    color: var(--color-text-muted);
    font-size: 0.92rem;
  }

  .timeline-itembullets {
    padding-left: 1.1rem;
    margin: 0.65rem 0 0.75rem;
  }

  .timeline-itembullets li {
    margin-top: 0.35rem;
  }

  .scroll-down-indicator {
    position: fixed;
    right: 1rem;
    bottom: 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    color: var(--color-text-faint);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    pointer-events: none;
  }

  .scroll-down-indicatorarrow {
    width: 14px;
    height: 24px;
    border-radius: 999px;
    border: 1px solid rgba(40,37,29,0.3);
    position: relative;
  }

  .scroll-down-indicatorarrow::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 5px;
    width: 2px;
    height: 8px;
    border-radius: 999px;
    background: rgba(40,37,29,0.5);
    transform: translateX(-50%);
    animation: sd-dot 1.2s ease-in-out infinite;
  }

  @keyframes sd-dot {
    0% { transform: translate(-50%, 0); opacity: 0; }
    30% { opacity: 1; }
    70% { transform: translate(-50%, 8px); opacity: 1; }
    100% { transform: translate(-50%, 12px); opacity: 0; }
  }

  @media (max-width: 640px) {
    .timeline-item { gap: 0.75rem; grid-template-columns: 1rem 1fr; }
    .timeline-itemcontent { padding-bottom: 1.5rem; }
    .timeline-itembullets { padding-left: 1rem; }
    .scroll-down-indicator { display: none; }
  }
</style>

<main class="main-content">
  {{ content }}
</main>

<script>
  document.querySelectorAll('.image-box img').forEach((img) => {
    if (!img.alt) return;
    const caption = document.createElement('p');
    caption.className = 'image-caption';
    caption.textContent = img.alt;
    img.after(caption);
  });
</script>
